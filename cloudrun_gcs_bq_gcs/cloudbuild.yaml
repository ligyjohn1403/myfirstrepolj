options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - -t
    - us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cloudrun-bq-service:latest
    - .

- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cloudrun-bq-service:latest

images:
- us-central1-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/cloudrun-bq-service:latest
